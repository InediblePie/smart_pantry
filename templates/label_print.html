<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Label</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .buttons {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="buttons">
        <button onclick="printLabel()">Print Label</button>
        <button onclick="window.location.href='/pantry/intake'">Back to Intake</button>
    </div>
    
    <p>Labels ready to print. Click "Print Label" or the print dialog will open automatically.</p>
    
    <script>
        const pdfUrl = '/pantry/label/image?serials={{ serials }}&item_id={{ item_id }}&expiration_date={{ expiration_date }}';
        
        function printLabel() {
            fetch(pdfUrl)
                .then(response => response.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = url;
                    document.body.appendChild(iframe);
                    iframe.onload = function() {
                        iframe.contentWindow.print();
                    };
                });
        }
        
        // Auto-trigger print after page loads
        window.onload = function() {
            setTimeout(printLabel, 500);
        };
    </script>
</body>
</html>
